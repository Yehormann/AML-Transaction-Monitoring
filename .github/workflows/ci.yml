name: CI Pipeline

on:
  push:
    branches: [main, development, herman]
  pull_request:
    branches: [main, development]

jobs:

  #  Stage 1: Compile
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compile
        working-directory: aml-monitoring/backend
        run: mvn clean compile -DskipTests

  #  Stage 2a: Unit Tests (must run in parallel with integration-tests) 
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # mvn test excludes *IntegrationTest per Surefire config in pom.xml
      - name: Run unit tests
        working-directory: aml-monitoring/backend
        run: mvn test

      - name: Upload unit test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: aml-monitoring/backend/target/surefire-reports/
          retention-days: 7

  #  Stage 2b: Integration Tests (parallel with unit-tests)
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      #  tests use H2 in-memory, no external DB
      - name: Run integration tests
        working-directory: aml-monitoring/backend
        run: mvn test -Dtest="TransactionIntegrationTest,AlertIntegrationTest"

      - name: Upload integration test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-reports
          path: aml-monitoring/backend/target/surefire-reports/
          retention-days: 7

  #  Stage 2c: Static Analysis
  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run Checkstyle
        working-directory: aml-monitoring/backend
        run: mvn checkstyle:checkstyle

      - name: Upload Checkstyle report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkstyle-report
          path: aml-monitoring/backend/target/checkstyle-result.xml
          retention-days: 7

  #  Stage 3: Package
  package:
    name: Package
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, static-analysis]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        working-directory: aml-monitoring/backend
        run: mvn package -DskipTests

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: aml-monitoring-${{ github.sha }}
          path: aml-monitoring/backend/target/aml-monitoring-*.jar
          retention-days: 7

  #  Stage 4: Deploy (we will have just a placeholder, since no need to deploy so far, but it is ready for CD integration)
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: package
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: aml-monitoring-${{ github.sha }}

      - name: Deployment ready
        run: |
          echo " Artifact aml-monitoring-${{ github.sha }}.jar is ready for deployment."
