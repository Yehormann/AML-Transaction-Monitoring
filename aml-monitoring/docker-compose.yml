services:

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: aml_db
      POSTGRES_USER: aml_user
      POSTGRES_PASSWORD: aml_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aml_user -d aml_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: aml_db
      DB_USER: aml_user
      DB_PASSWORD: aml_pass
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
